name: Release LuckEnv

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync package version from tag
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          node -e "const fs=require('fs');const p='package.json';const t=(process.env.VERSION_TAG||'').replace(/^v/,'');const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=t;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');console.log('package version =>',j.version)"

      - name: Install build dependencies
        run: choco install -y make

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 'stable'

      - name: Get npm cache directory
        id: npm-cache-dir
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
            .yarn/cache
            ~/.cache/node-gyp
            ~\AppData\Local\node-gyp
          key: ${{ runner.os }}-x64-node-${{ hashFiles('**/package.json') }}

      - name: Install dependencies
        run: |
          npm install -g yarn node-gyp
          $env:LINK = "runtimeobject.lib"
          yarn install --network-timeout 1000000

      - name: Build Go helper
        run: |
          go install github.com/tc-hib/go-winres@latest
          $GOBIN = $(go env GOPATH) + "\bin"
          $env:PATH = "$GOBIN;$env:PATH"
          cd "$env:GITHUB_WORKSPACE/src/helper-go"
          go mod download
          go mod tidy
          go-winres make
          .\build-win.ps1

      - name: Build Electron packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn build 2>&1 | Tee-Object -FilePath build.log

      - name: List build output
        run: |
          Write-Host "=== Current directory ==="
          Get-ChildItem . -Depth 1
          Write-Host "=== Checking release directory ==="
          if (Test-Path release) {
            Get-ChildItem release -Recurse
          } else {
            Write-Host "Release directory not found!"
            Write-Host "=== Checking dist directory ==="
            if (Test-Path dist) {
              Get-ChildItem dist -Recurse
            }
            Write-Host "=== Build log (last 50 lines) ==="
            if (Test-Path build.log) {
              Get-Content build.log -Tail 50
            }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/
          if-no-files-found: error

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            os: macos-15
          - arch: arm64
            os: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync package version from tag
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          node -e "const fs=require('fs');const p='package.json';const t=(process.env.VERSION_TAG||'').replace(/^v/,'');const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=t;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');console.log('package version =>',j.version)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 'stable'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
            .yarn/cache
            ~/.cache/node-gyp
          key: ${{ runner.os }}-${{ matrix.arch }}-node-${{ hashFiles('**/package.json') }}

      - name: Install dependencies
        run: |
          npm install -g yarn node-gyp
          yarn install --network-timeout 1000000

      - name: Build Go helper
        run: |
          cd "$GITHUB_WORKSPACE/src/helper-go"
          chmod +x ./build.sh
          bash ./build.sh

      - name: Build Electron App
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn build 2>&1 | tee build.log

      - name: List build output
        run: |
          echo "=== Current directory ==="
          ls -la
          echo "=== Checking release directory ==="
          if [ -d "release" ]; then
            ls -la release/
          else
            echo "Release directory not found!"
            echo "=== Checking dist directory ==="
            if [ -d "dist" ]; then
              ls -la dist/
            fi
            echo "=== Build log (last 50 lines) ==="
            if [ -f "build.log" ]; then
              tail -50 build.log
            fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: release/
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-final
          
          echo "=== Checking release-artifacts directory ==="
          if [ ! -d "release-artifacts" ]; then
            echo "ERROR: release-artifacts directory not found!"
            exit 1
          fi
          
          echo "=== Contents of release-artifacts ==="
          find release-artifacts -type f
          
          echo "=== Copying release files ==="
          find release-artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" \) -exec cp {} release-final/ \;
          
          echo "=== Final release files ==="
          ls -la release-final/
          
          FILE_COUNT=$(ls -1 release-final/ 2>/dev/null | wc -l)
          if [ $FILE_COUNT -eq 0 ]; then
            echo "ERROR: No release files found!"
            exit 1
          fi

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: LuckEnv ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## LuckEnv ${{ steps.get_version.outputs.VERSION }}
            
            ### 下载链接
            
            | 平台 | 架构 | 文件 |
            |------|------|------|
            | **Windows** | x64 | `LuckEnv-Setup-${{ steps.get_version.outputs.VERSION }}.exe` |
            | **macOS** | Intel (x64) | `LuckEnv-${{ steps.get_version.outputs.VERSION }}.dmg` |
            | **macOS** | Apple Silicon (arm64) | `LuckEnv-${{ steps.get_version.outputs.VERSION }}-arm64.dmg` |
            
            ### 更新说明
            
            - 移除许可证限制，所有功能完全开放
            - 更新作者信息
            - 仅支持 Windows 和 macOS
            
            ---
            
            **完整更新日志**: https://github.com/luckerr2007/LuckEnv/compare/${{ steps.get_version.outputs.VERSION }}...HEAD
          files: release-final/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
